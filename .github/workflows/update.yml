name: Update Man City Calendar

on:
  schedule:
    - cron: "0 21 * * *"   # 毎朝 6:00 JST (= 21:00 UTC)
  workflow_dispatch:

jobs:
  update-ics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate ICS
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          python generate_mancity_ics.py \
            --api-key "$FOOTBALL_DATA_KEY" \
            --output city_official.ics \
            --timezone Asia/Tokyo \
            --tz-offset 9

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add city_official.ics
          if git diff --staged --quiet; then
            echo "変更なし。スキップします。"
          else
            git commit -m "chore: カレンダー自動更新 $(date +'%Y-%m-%d')"
            git push
          fi
