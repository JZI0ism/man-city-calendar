name: Update Man City Calendar

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  update-ics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug API goals response
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          python3 -c "
import json, os
from urllib.request import urlopen, Request

BASE_URL = 'https://api.football-data.org/v4'
api_key = os.environ['FOOTBALL_DATA_KEY']

def fetch(url):
    with urlopen(Request(url, headers={'X-Auth-Token': api_key}), timeout=15) as r:
        return json.loads(r.read().decode())

data = fetch(f'{BASE_URL}/teams/65/matches?status=FINISHED')
matches = data.get('matches', [])
if not matches:
    print('No finished matches')
else:
    m = matches[-1]
    mid = m['id']
    print(f'Match ID: {mid}')
    print(f'  {(m.get(\"homeTeam\") or {}).get(\"name\")} vs {(m.get(\"awayTeam\") or {}).get(\"name\")}')
    detail = fetch(f'{BASE_URL}/matches/{mid}')
    print(f'Keys: {list(detail.keys())}')
    print(f'goals: {json.dumps(detail.get(\"goals\"), indent=2)}')
"

      - name: Generate ICS
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          python generate_mancity_ics.py \
            --api-key "$FOOTBALL_DATA_KEY" \
            --output city_official.ics \
            --timezone Asia/Tokyo \
            --tz-offset 9

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add city_official.ics
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update calendar $(date +'%Y-%m-%d')"
            git push
          fi
